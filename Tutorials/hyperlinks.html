<!DOCTYPE html>
<html>
    <head>
        <title>Hyperlinks tutorial</title>
    </head>
    <body>
        <a href="https://tenor.com/view/lebron-james-lebron-los-angeles-lakers-lakers-dunk-gif-16216227"> <!--<a> means anchor tag, we add a href attribute so the text is actually clickable an attribute is a name value 
            pair that modifies the behaviour of an element,
            href means hyper text reference, 
            within the quotes we can reference a file or link--->
            Click me
        </a>
        <a href="https://www.google.com/"
        target="_blank"
        title=""
        >
        <!--_blank will open the link in a new tab or window depending on your settings-->
        <!--title gives extra info as a tool tip (if you hover over the link)-->
            Google
        </a>
    </body>
</html>
